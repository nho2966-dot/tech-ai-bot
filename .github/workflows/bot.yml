name: Tech Sovereign Bot V1100

on:
  schedule:
    # يعمل كل 6 ساعات لضمان فحص المواعيد والردود (أو حسب رغبتك)
    - cron: '0 */6 * * *' 
  workflow_dispatch: # يسمح لك بتشغيله يدوياً من GitHub Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tweepy httpx loguru python-dotenv apscheduler

      - name: Download previous database
        uses: actions/download-artifact@v4
        with:
          name: tech-database
        continue-on-error: true # لكي لا يتوقف العمل في أول مرة قبل وجود قاعدة بيانات

      - name: Run Bot (Manual Mode for Actions)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_KEY: ${{ secrets.TAVILY_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py manual

      - name: Upload updated database
        uses: actions/upload-artifact@v4
        with:
          name: tech-database
          path: tech_master_v1100.db
          retention-days: 7 # يحفظ القاعدة لمدة 7 أيام
