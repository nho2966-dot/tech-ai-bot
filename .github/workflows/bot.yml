name: Tech Sovereign Bot V1800

on:
  schedule:
    # تشغيل كل ساعة لضمان عدم ضياع المنشنات (توازن بين الاستهلاك والسرعة)
    - cron: '0 * * * *' 
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions: # إضافة صلاحيات الكتابة لضمان رفع الملفات
      contents: write
      actions: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tweepy httpx loguru python-dotenv apscheduler

      - name: Download Previous Database
        uses: actions/download-artifact@v4
        with:
          name: tech-database
        continue-on-error: true 

      - name: Run Sovereign Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_KEY: ${{ secrets.TAVILY_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python main.py manual 

      - name: Upload Updated Database
        if: always() # لضمان رفع القاعدة حتى لو فشل جزء من الكود
        uses: actions/upload-artifact@v4
        with:
          name: tech-database
          path: tech_database.db
          retention-days: 7
          overwrite: true # يضمن تحديث الملف القديم بالجديد
