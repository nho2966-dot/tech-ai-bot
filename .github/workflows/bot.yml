name: Tech Sovereign Bot V1800

on:
  schedule:
    # يعمل كل 6 ساعات لفحص المهام المجدولة والمنشنات
    - cron: '0 */6 * * *' 
  workflow_dispatch: # للتشغيل اليدوي من GitHub Actions

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tweepy httpx loguru python-dotenv apscheduler

      - name: Download Previous Database
        uses: actions/download-artifact@v4
        with:
          name: tech-database
        continue-on-error: true # لضمان استمرار العمل في أول مرة قبل وجود قاعدة بيانات

      - name: Run Sovereign Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_KEY: ${{ secrets.TAVILY_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python main.py manual # نستخدم manual هنا ليعمل البوت مرة واحدة وينتهي داخل الـ Workflow

      - name: Upload Updated Database
        uses: actions/upload-artifact@v4
        with:
          name: tech-database
          path: tech_database.db # المسار الموحد الجديد
          retention-days: 7
