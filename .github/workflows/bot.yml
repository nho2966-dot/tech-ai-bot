name: Run Tech AI Bot

on:
  schedule:
    - cron: '0 */6 * * *' # تشغيل آلي كل 6 ساعات
  workflow_dispatch: # تشغيل يدوي عند الحاجة

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 💡 هذا السطر هو السر اللي بيقفل التنبيه ويفعل Node 24 فوراً
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # تأكد إنها v4

      - name: Set up Python
        uses: actions/setup-python@v5 # تأكد إنها v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx tweepy loguru python-dotenv

      - name: Run Bot V33
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: python main.py
