name: Tech AI Newsroom Bot

on:
  schedule:
    # يعمل كل 6 ساعات (بتوقيت UTC) لضمان تغطية الأخبار والردود
    - cron: '0 */6 * * *'
  workflow_dispatch: # يسمح لك بتشغيل البوت يدوياً من صفحة Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # تسريع التثبيت في المرات القادمة

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tweepy httpx loguru python-dotenv

      - name: Restore Database Cache
        uses: actions/cache@v3
        with:
          path: newsroom_v5.db
          key: ${{ runner.os }}-db-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-db-

      - name: Run Newsroom Bot
        run: python main.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_KEY: ${{ secrets.TAVILY_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}

      - name: Save Database Cache
        if: always() # لضمان حفظ التغييرات في قاعدة البيانات حتى لو حدث خطأ بسيط
        uses: actions/cache@v3
        with:
          path: newsroom_v5.db
          key: ${{ runner.os }}-db-${{ github.run_id }}
